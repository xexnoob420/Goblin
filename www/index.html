<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OSRS F2P Market Goblin Terminal Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
    :root{
        --bg:#10151c;
        --panel:#1a2430;
        --panel2:#243447;
        --gold:#f5c542;
        --text:#e6edf3;
        --muted:#94a3b8;
        --green:#4ade80;
        --red:#f87171;
        --orange:#fb923c;
    }

    body{
        margin:0;
        background:linear-gradient(to bottom,#0f172a,#111827);
        color:var(--text);
        font-family:Arial,sans-serif;
        padding:20px;
    }

    h1{
        font-family:'Press Start 2P', cursive;
        color:var(--gold);
        font-size:22px;
        margin-bottom:12px;
    }

    .controls{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        margin-bottom:20px;
        background: var(--panel);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #334155;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .input-group label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        font-weight: bold;
    }

    input[type="text"], input[type="number"], select{
        background:#10151c;
        border:1px solid #334155;
        color:white;
        padding:10px;
        border-radius:8px;
        height: 40px;
        box-sizing: border-box;
        min-width: 150px;
    }

    input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: var(--gold);
        margin-top: 5px;
    }

    .checkbox-group {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding-bottom: 0px;
    }

    .checkbox-group label {
        font-size: 12px;
        margin: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    button{
        background:var(--gold);
        color:black;
        border:none;
        padding:0 20px;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
        height: 40px;
        align-self: flex-end;
    }

    button:hover{
        opacity:0.9;
    }

    .stats{
        margin-bottom:15px;
        color:var(--muted);
        font-size: 13px;
    }

    /* CARD GRID LAYOUT */
    .cards-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
    }

    @media (max-width: 768px) {
        .cards-container {
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
    }

    @media (max-width: 480px) {
        .cards-container {
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
        }
    }

    .card {
        background: var(--panel);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: relative;
    }

    .card:hover {
        background: var(--panel2);
        border-color: var(--gold);
        transform: translateY(-2px);
    }

    .card.selected {
        border-color: var(--gold);
        box-shadow: 0 0 15px rgba(245, 197, 66, 0.3);
    }

    .card.dump-warning {
        border-color: var(--red);
        box-shadow: 0 0 10px rgba(248, 113, 113, 0.2);
    }

    .card.dump-warning::before {
        content: "⚠️ DUMP";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--red);
        color: white;
        font-size: 9px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: bold;
        z-index: 1;
    }

    .card-favorite {
        font-size: 18px;
        cursor: pointer;
        user-select: none;
    }

    .card-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 4px;
        box-sizing: border-box;
    }

    .card-name {
        font-weight: bold;
        font-size: 12px;
        color: var(--text);
        word-break: break-word;
        min-height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card-data {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .card-price {
        color: #60a5fa;
    }

    .card-margin {
        font-weight: bold;
    }

    .card-margin.good {
        color: var(--green);
    }

    .card-margin.bad {
        color: var(--red);
    }

    .card-profit {
        color: var(--gold);
        font-weight: bold;
        padding: 4px;
        background: rgba(245, 197, 66, 0.1);
        border-radius: 4px;
    }

    .card-age {
        font-size: 10px;
        color: var(--muted);
    }

    .status-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 4px;
    }
    .status-fresh { background-color: var(--green); }
    .status-stale { background-color: var(--orange); }
    .status-dead { background-color: var(--red); }

    /* DETAIL PANEL */
    .detail-panel {
        background: var(--panel);
        border: 2px solid var(--gold);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .detail-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .detail-icon {
        width: 64px;
        height: 64px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 4px;
    }

    .detail-title {
        font-family: 'Press Start 2P', cursive;
        color: var(--gold);
        font-size: 16px;
    }

    .detail-close {
        background: var(--red);
        color: white;
        border: none;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        font-weight: bold;
        margin-left: auto;
    }

    .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 15px;
    }

    .detail-section {
        background: var(--panel2);
        border-radius: 8px;
        padding: 12px;
    }

    .detail-section h3 {
        color: var(--gold);
        font-size: 12px;
        margin: 0 0 8px 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .detail-stat {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 12px;
    }

    .detail-stat .label {
        color: var(--muted);
    }

    .detail-stat .value {
        color: var(--text);
        font-weight: bold;
    }

    .market-indicator {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: bold;
        margin-left: 5px;
    }

    .market-dump {
        background: rgba(248, 113, 113, 0.2);
        color: var(--red);
    }

    .market-rise {
        background: rgba(74, 222, 128, 0.2);
        color: var(--green);
    }

    .market-stable {
        background: rgba(148, 163, 184, 0.2);
        color: var(--muted);
    }

    .wiki-info {
        font-size: 12px;
        line-height: 1.6;
        color: var(--text);
        max-height: 150px;
        overflow-y: auto;
        padding-right: 10px;
    }

    .wiki-info::-webkit-scrollbar {
        width: 5px;
    }

    .wiki-info::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .trade-activity {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }

    .activity-bar {
        flex: 1;
        height: 6px;
        background: var(--panel);
        border-radius: 3px;
        overflow: hidden;
    }

    .activity-fill {
        height: 100%;
        transition: width 0.3s;
    }

    .activity-buy { background: var(--green); }
    .activity-sell { background: var(--red); }

    .quick-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    .quick-actions button {
        flex: 1;
        font-size: 11px;
    }

    .wiki-link {
        background: #1a56db;
        color: white;
    }

    .wiki-link:hover {
        background: #1e40af;
    }

    .footer{
        margin-top:20px;
        color:var(--muted);
        font-size:12px;
    }

    .loading{
        margin-top:20px;
        color:var(--gold);
        text-align: center;
    }

    #cards {
        min-height: 200px;
    }
    
    .dump-alert {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid var(--red);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 10px;
        color: var(--red);
        font-size: 12px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>🪙 F2P Market Goblin Terminal Pro</h1>

<div class="controls">
    <div class="input-group">
        <label>Search Items</label>
        <input type="text" id="search" placeholder="Search items..." />
    </div>

    <div class="input-group">
        <label>Filter Bracket</label>
        <select id="filter">
            <option value="all">All F2P</option>
            <option value="favorites">Favorites</option>
            <option value="flips">Best High-Volume Flips</option>
        </select>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="under100" />
        <label for="under100">Under 100 GP (Tax Exempt)</label>
    </div>
    
    <div class="checkbox-group">
        <input type="checkbox" id="showDumps" />
        <label for="showDumps">⚠️ Show Only Possible Dumps</label>
    </div>

    <div class="input-group">
        <label>Sort By</label>
        <select id="sort">
            <option value="profit">Highest Profit</option>
            <option value="budget">Highest Budget Profit</option>
            <option value="margin">Highest Margin</option>
            <option value="margin-asc">Lowest Margin</option>
            <option value="recent">Most Recently Updated</option>
            <option value="oldest">Least Recently Updated</option>
        </select>
    </div>

    <div class="input-group">
        <label>Your Cash Stack (GP)</label>
        <input type="number" id="budget" value="100000" placeholder="e.g. 100000" />
    </div>

    <button onclick="refreshData()">🔄 Refresh Data</button>
</div>

<div class="stats" id="stats"></div>
<div id="detail-container"></div>

<div class="loading" id="loading">
    Summoning goblin economists...
</div>

<div class="cards-container" id="cards" style="display:none;"></div>

<div class="footer">
    Live data from OSRS Wiki API & Jagex Database. Tax note: Items valued under 100 GP are completely exempt from the 1% Grand Exchange Tax!
</div>

<script>
const mappingURL = "https://prices.runescape.wiki/api/v1/osrs/mapping";
const latestURL = "https://prices.runescape.wiki/api/v1/osrs/latest";
const volumeURL = "https://prices.runescape.wiki/api/v1/osrs/volumes";
const wikiAPI = "https://oldschool.runescape.wiki/api.php";

const customHeaders = {
    headers: {
        'User-Agent': 'F2P Market Goblin Pro Terminal - Interactive Engine'
    }
};

let allItems = [];
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let searchTimeout;
let selectedItem = null;
let itemWikiCache = {};

// Correct tax calculation (1% tax, capped at 5M)
function calculateNetMargin(low, high) {
    if (low === 0 || high === 0) return 0;
    if (high < 100) return high - low;
    const tax = Math.min(5000000, Math.floor(high * 0.01));
    return high - low - tax;
}

// Enhanced dump detection algorithm
function detectDump(item) {
    let dumpScore = 0;
    let reasons = [];
    
    // Criteria 1: Very low margins with high volume
    if (item.margin <= 5 && item.buyVolume > 50000) {
        dumpScore += 3;
        reasons.push("High volume, near-zero margins");
    }
    
    // Criteria 2: Negative margins (buy price higher than sell)
    if (item.margin < 0) {
        dumpScore += 5;
        reasons.push("Negative profit margins");
    }
    
    // Criteria 3: High volume but low buy price (fire sale)
    if (item.buyVolume > 100000 && item.low < 100) {
        dumpScore += 2;
        reasons.push("Massive volume on cheap item");
    }
    
    // Criteria 4: Margin less than 1% of item value
    if (item.low > 0 && (item.margin / item.low) < 0.01 && item.buyVolume > 20000) {
        dumpScore += 2;
        reasons.push("Margins below 1% with high volume");
    }
    
    // Criteria 5: Very low buy price compared to typical item value
    if (item.low < 10 && item.buyVolume > 10000) {
        dumpScore += 1;
        reasons.push("Near-worthless item being heavily traded");
    }
    
    return {
        isDump: dumpScore >= 3,
        dumpScore: dumpScore,
        reasons: reasons,
        severity: dumpScore >= 6 ? "High" : dumpScore >= 4 ? "Medium" : "Low"
    };
}

// Fetch wiki information for an item
async function fetchWikiInfo(itemName) {
    if (itemWikiCache[itemName]) {
        return itemWikiCache[itemName];
    }

    try {
        const params = new URLSearchParams({
            action: 'query',
            format: 'json',
            titles: itemName,
            prop: 'extracts|pageimages',
            exintro: 1,
            explaintext: 1,
            piprop: 'thumbnail',
            pithumbsize: 100,
            origin: '*'
        });

        const response = await fetch(`${wikiAPI}?${params}`);
        const data = await response.json();
        
        const pages = data.query.pages;
        const page = pages[Object.keys(pages)[0]];
        
        const info = {
            extract: page.extract ? page.extract.substring(0, 300) + '...' : 'No information available.',
            pageId: page.pageid,
            thumbnail: page.thumbnail ? page.thumbnail.source : null,
            url: `https://oldschool.runescape.wiki/w/${encodeURIComponent(itemName.replace(/ /g, '_'))}`
        };
        
        itemWikiCache[itemName] = info;
        return info;
    } catch (error) {
        console.error('Wiki fetch failed:', error);
        return {
            extract: 'Wiki information unavailable.',
            url: `https://oldschool.runescape.wiki/w/${encodeURIComponent(itemName.replace(/ /g, '_'))}`
        };
    }
}

// Analyze market trends based on price data
function analyzeMarketTrends(item) {
    const dumpAnalysis = detectDump(item);
    const volume = item.buyVolume;
    const margin = item.margin;
    const low = item.low;
    const high = item.high;
    
    // Priority: Check for dumps first
    if (dumpAnalysis.isDump) {
        return {
            type: 'dump',
            label: `🚨 ${dumpAnalysis.severity} Risk Dump Detected`,
            class: 'market-dump',
            description: `Dump Score: ${dumpAnalysis.dumpScore}/10. Reasons: ${dumpAnalysis.reasons.join('. ')}.`,
            dumpDetails: dumpAnalysis
        };
    }
    
    // Detect rising items (high volume, good margins)
    if (volume > 20000 && margin > 50 && high > 500) {
        return {
            type: 'rise',
            label: 'Price Rising',
            class: 'market-rise',
            description: 'Strong demand with increasing margins indicates upward price movement.'
        };
    }
    
    // Detect stable flips
    if (volume > 10000 && margin > 10) {
        return {
            type: 'stable',
            label: 'Stable Flip Opportunity',
            class: 'market-stable',
            description: 'Consistent volume and margins suggest a reliable flipping opportunity.'
        };
    }
    
    // Low activity
    if (volume < 1000) {
        return {
            type: 'quiet',
            label: 'Low Trading Activity',
            class: 'market-stable',
            description: 'This item has very low trading volume. Flipping may be slow.'
        };
    }
    
    return {
        type: 'normal',
        label: 'Normal Market Activity',
        class: 'market-stable',
        description: 'Standard trading patterns observed.'
    };
}

// Show detailed item panel
async function showItemDetails(item, cardElement) {
    // Remove previous selection
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    cardElement.classList.add('selected');
    
    selectedItem = item;
    
    const detailContainer = document.getElementById('detail-container');
    const trends = analyzeMarketTrends(item);
    const wikiInfo = await fetchWikiInfo(item.name);
    const dumpAnalysis = detectDump(item);
    
    // Calculate trade activity ratio
    const buyRatio = item.buyVolume > 0 ? 0.6 : 0.5; // Simulated, real data would be better
    const sellRatio = 1 - buyRatio;
    
    const nowSeconds = Math.floor(Date.now() / 1000);
    const ageMinutes = item.lastUpdateTime > 0 ? Math.floor((nowSeconds - item.lastUpdateTime) / 60) : 999;
    
    let dumpWarningHTML = '';
    if (dumpAnalysis.isDump) {
        dumpWarningHTML = `
            <div class="dump-alert">
                ⚠️ DUMP WARNING (Severity: ${dumpAnalysis.severity}) - Score: ${dumpAnalysis.dumpScore}/10
                <br>Reasons: ${dumpAnalysis.reasons.join(', ')}
            </div>
        `;
    }
    
    detailContainer.innerHTML = `
        <div class="detail-panel">
            <div class="detail-header">
                <img src="https://secure.runescape.com/m=itemdb_oldschool/obj_big.gif?id=${item.id}" 
                     alt="${item.name}" class="detail-icon"
                     onerror="this.src='https://secure.runescape.com/m=itemdb_oldschool/obj_big.gif?id=995';">
                <div>
                    <div class="detail-title">${item.name}</div>
                    <span class="market-indicator ${trends.class}">${trends.label}</span>
                </div>
                <button class="detail-close" onclick="closeDetail()">✕</button>
            </div>
            
            ${dumpWarningHTML}
            
            <div class="detail-grid">
                <div class="detail-section">
                    <h3>💰 Market Prices</h3>
                    <div class="detail-stat">
                        <span class="label">Buy Price:</span>
                        <span class="value">${item.low.toLocaleString()} gp</span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">Sell Price:</span>
                        <span class="value">${item.high.toLocaleString()} gp</span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">Net Margin:</span>
                        <span class="value" style="color: ${item.margin > 0 ? 'var(--green)' : 'var(--red)'}">
                            ${Math.floor(item.margin).toLocaleString()} gp
                        </span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">ROI:</span>
                        <span class="value">${item.low > 0 ? ((item.margin / item.low) * 100).toFixed(2) : 0}%</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>📊 Trading Activity</h3>
                    <div class="detail-stat">
                        <span class="label">Daily Volume:</span>
                        <span class="value">${item.buyVolume.toLocaleString()}</span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">GE Buy Limit:</span>
                        <span class="value">${item.geLimit.toLocaleString()}</span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">Max Profit/4h:</span>
                        <span class="value" style="color: var(--gold)">
                            ${item.maxProfit.toLocaleString()} gp
                        </span>
                    </div>
                    <div class="trade-activity">
                        <div style="font-size: 11px; color: var(--muted);">
                            <span style="color: var(--green);">Buy ${(buyRatio * 100).toFixed(0)}%</span> | 
                            <span style="color: var(--red);">Sell ${(sellRatio * 100).toFixed(0)}%</span>
                        </div>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>⏰ Status</h3>
                    <div class="detail-stat">
                        <span class="label">Last Updated:</span>
                        <span class="value">${ageMinutes <= 3 ? '🟢 Fresh' : ageMinutes <= 12 ? '🟡 Stale' : '🔴 Old'} (${ageMinutes}m ago)</span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">Tax Status:</span>
                        <span class="value">${item.high < 100 ? '✅ Tax Exempt' : '⚠️ 1% Tax'}</span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">Dump Score:</span>
                        <span class="value" style="color: ${dumpAnalysis.dumpScore >= 4 ? 'var(--red)' : dumpAnalysis.dumpScore >= 2 ? 'var(--orange)' : 'var(--green)'}">
                            ${dumpAnalysis.dumpScore}/10
                        </span>
                    </div>
                </div>
            </div>
            
            <div class="detail-section" style="margin-bottom: 15px;">
                <h3>📈 Market Analysis</h3>
                <p style="margin: 5px 0; font-size: 12px; color: var(--text);">${trends.description}</p>
                <div style="margin-top: 10px;">
                    <div class="detail-stat">
                        <span class="label">Profit Potential:</span>
                        <span class="value" style="color: ${item.margin > 20 ? 'var(--green)' : item.margin > 5 ? 'var(--orange)' : 'var(--red)'}">
                            ${item.margin > 20 ? 'High' : item.margin > 5 ? 'Medium' : 'Low'}
                        </span>
                    </div>
                    <div class="detail-stat">
                        <span class="label">Volume Health:</span>
                        <span class="value" style="color: ${item.buyVolume > 10000 ? 'var(--green)' : item.buyVolume > 1000 ? 'var(--orange)' : 'var(--red)'}">
                            ${item.buyVolume > 10000 ? 'Excellent' : item.buyVolume > 1000 ? 'Moderate' : 'Poor'}
                        </span>
                    </div>
                    ${dumpAnalysis.isDump ? `
                    <div class="detail-stat">
                        <span class="label">Dump Severity:</span>
                        <span class="value" style="color: var(--red);">
                            ${dumpAnalysis.severity} Risk
                        </span>
                    </div>
                    ` : ''}
                </div>
            </div>
            
            <div class="detail-section">
                <h3>📚 Wiki Information</h3>
                <div class="wiki-info">
                    ${wikiInfo.extract}
                </div>
            </div>
            
            <div class="quick-actions">
                <button onclick="toggleFavorite(${item.id})" style="background: ${favorites.includes(item.id) ? 'var(--orange)' : 'var(--panel2)'}; color: white;">
                    ${favorites.includes(item.id) ? '⭐ Remove Favorite' : '☆ Add to Favorites'}
                </button>
                <button class="wiki-link" onclick="window.open('${wikiInfo.url}', '_blank')">
                    📖 Open Wiki Page
                </button>
            </div>
        </div>
    `;
}

function closeDetail() {
    document.getElementById('detail-container').innerHTML = '';
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    selectedItem = null;
}

async function refreshData() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("cards").style.display = "none";
    document.getElementById("loading").innerText = "Summoning goblin economists...";

    try {
        const [mappingRes, latestRes, volumeRes] = await Promise.all([
            fetch(mappingURL, customHeaders),
            fetch(latestURL, customHeaders),
            fetch(volumeURL, customHeaders)
        ]);

        const mapping = await mappingRes.json();
        const latest = await latestRes.json();
        const volumes = await volumeRes.json();

        allItems = mapping
        .filter(item => item.members === false)
        .map(item => {
            const price = latest.data[item.id];
            const volume = volumes.data[item.id];

            if(!price) return null;

            const low = price.low || 0;
            const high = price.high || 0;
            const margin = calculateNetMargin(low, high); 
            const buyVolume = volume || 0;
            const geLimit = item.limit || 0;

            const lastUpdateTime = Math.max(price.lowTime || 0, price.highTime || 0);
            const maxProfit = margin > 0 && geLimit > 0 ? margin * geLimit : 0;
            
            // Add dump detection data
            const dumpInfo = detectDump({ low, high, margin, buyVolume });

            return {
                id: item.id,
                name: item.name,
                low,
                high,
                margin,
                buyVolume,
                geLimit,
                maxProfit,
                lastUpdateTime,
                isDump: dumpInfo.isDump,
                dumpScore: dumpInfo.dumpScore,
                dumpSeverity: dumpInfo.severity,
                dumpReasons: dumpInfo.reasons
            };
        })
        .filter(Boolean);

        renderCards();

    } catch(err){
        console.error(err);
        document.getElementById("loading").innerText = "The goblin market exploded. Check developer console.";
    }
}

function renderCards(){
    const cardsContainer = document.getElementById("cards");
    cardsContainer.innerHTML = "";

    let items = [...allItems];

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;
    const sort = document.getElementById("sort").value;
    const under100 = document.getElementById("under100").checked;
    const showDumps = document.getElementById("showDumps").checked;
    const budget = parseInt(document.getElementById("budget").value) || 0;
    const nowSeconds = Math.floor(Date.now() / 1000);

    // Dynamic property injection (Budget based parameters)
    items = items.map(item => {
        let affordableQty = item.low > 0 ? Math.floor(budget / item.low) : 0;
        if(item.geLimit > 0 && affordableQty > item.geLimit) {
            affordableQty = item.geLimit;
        }
        const budgetProfit = item.margin > 0 ? affordableQty * item.margin : 0;
        const isFavNum = favorites.includes(item.id) ? 1 : 0;

        return { ...item, affordableQty, budgetProfit, favorite: isFavNum };
    });

    // Content filtration engines
    if(search) {
        items = items.filter(item => item.name.toLowerCase().includes(search));
    }

    if(under100){
        items = items.filter(item => item.low > 0 && item.low < 100);
    }
    
    if(showDumps){
        items = items.filter(item => item.isDump === true);
    }

    if(filter === "favorites"){
        items = items.filter(item => favorites.includes(item.id));
    } else if(filter === "flips"){
        items = items.filter(item => item.margin > 1 && item.buyVolume > 15000);
    }

    // Sort by selected option
    if(sort === "profit"){
        items.sort((a, b) => b.maxProfit - a.maxProfit);
    } else if(sort === "budget"){
        items.sort((a, b) => b.budgetProfit - a.budgetProfit);
    } else if(sort === "margin"){
        items.sort((a, b) => b.margin - a.margin);
    } else if(sort === "margin-asc"){
        items.sort((a, b) => a.margin - b.margin);
    } else if(sort === "recent"){
        items.sort((a, b) => b.lastUpdateTime - a.lastUpdateTime);
    } else if(sort === "oldest"){
        items.sort((a, b) => a.lastUpdateTime - b.lastUpdateTime);
    }

    // Render up to 300 cards
    items.slice(0, 300).forEach(item => {
        const isFavorite = favorites.includes(item.id);
        const iconSrc = `https://secure.runescape.com/m=itemdb_oldschool/obj_big.gif?id=${item.id}`;

        const ageMinutes = item.lastUpdateTime > 0 ? Math.floor((nowSeconds - item.lastUpdateTime) / 60) : 999;
        let statusClass = "status-dead";
        let ageText = ageMinutes + "m";
        
        if (ageMinutes <= 3) statusClass = "status-fresh";
        else if (ageMinutes <= 12) statusClass = "status-stale";
        
        if (item.lastUpdateTime === 0 || ageMinutes > 120) {
            ageText = "Old";
        }

        const marginClass = item.margin > 0 ? "good" : "bad";

        const card = document.createElement("div");
        card.className = "card";
        if (selectedItem && selectedItem.id === item.id) {
            card.classList.add('selected');
        }
        if (item.isDump) {
            card.classList.add('dump-warning');
        }
        card.innerHTML = `
            <div class="card-favorite" onclick="event.stopPropagation(); toggleFavorite(${item.id}); renderCards();">
                ${isFavorite ? '⭐' : '☆'}
            </div>
            <img src="${iconSrc}" alt="${item.name}" class="card-icon" onerror="this.src='https://secure.runescape.com/m=itemdb_oldschool/obj_big.gif?id=995';">
            <div class="card-name">${item.name}</div>
            <div class="card-data">
                <div class="card-price">${item.low.toLocaleString()} → ${item.high.toLocaleString()}</div>
                <div class="card-margin ${marginClass}">${Math.floor(item.margin).toLocaleString()} gp</div>
                <div class="card-profit">${item.budgetProfit.toLocaleString()} gp</div>
                <div class="card-age"><span class="status-dot ${statusClass}"></span>${ageText}</div>
            </div>
        `;
        card.onclick = () => showItemDetails(item, card);
        cardsContainer.appendChild(card);
    });

    if(items.length === 0) {
        cardsContainer.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--muted);'>No items match your filters</p>";
    }

    document.getElementById("loading").style.display = "none";
    document.getElementById("cards").style.display = "grid";

    const stats = document.getElementById("stats");
    stats.innerText = `${items.length} items available`;
}

function toggleFavorite(id) {
    const index = favorites.indexOf(id);
    if (index > -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push(id);
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
}

refreshData();

// Auto-refresh every 60 seconds
setInterval(refreshData, 60000);

// Event listeners
document.getElementById("search").addEventListener("input", () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(renderCards, 300);
});

document.getElementById("filter").addEventListener("change", renderCards);
document.getElementById("sort").addEventListener("change", renderCards);
document.getElementById("under100").addEventListener("change", renderCards);
document.getElementById("showDumps").addEventListener("change", renderCards);
document.getElementById("budget").addEventListener("input", () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(renderCards, 300);
});

</script>
</body>
