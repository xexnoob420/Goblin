<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OSRS F2P Market Goblin Terminal Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
    :root{
        --bg:#10151c;
        --panel:#1a2430;
        --panel2:#243447;
        --gold:#f5c542;
        --text:#e6edf3;
        --muted:#94a3b8;
        --green:#4ade80;
        --red:#f87171;
        --orange:#fb923c;
    }

    body{
        margin:0;
        background:linear-gradient(to bottom,#0f172a,#111827);
        color:var(--text);
        font-family:Arial,sans-serif;
        padding:20px;
    }

    h1{
        font-family:'Press Start 2P', cursive;
        color:var(--gold);
        font-size:22px;
        margin-bottom:12px;
    }

    .controls{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        margin-bottom:20px;
        background: var(--panel);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #334155;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .input-group label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        font-weight: bold;
    }

    input[type="text"], input[type="number"], select{
        background:#10151c;
        border:1px solid #334155;
        color:white;
        padding:10px;
        border-radius:8px;
        height: 40px;
        box-sizing: border-box;
        min-width: 150px;
    }

    input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: var(--gold);
        margin-top: 5px;
    }

    .checkbox-group {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding-bottom: 0px;
    }

    .checkbox-group label {
        font-size: 12px;
        margin: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    button{
        background:var(--gold);
        color:black;
        border:none;
        padding:0 20px;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
        height: 40px;
        align-self: flex-end;
    }

    button:hover{
        opacity:0.9;
    }

    .stats{
        margin-bottom:15px;
        color:var(--muted);
        font-size: 13px;
    }

    /* CARD GRID LAYOUT */
    .cards-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
    }

    @media (max-width: 768px) {
        .cards-container {
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
    }

    @media (max-width: 480px) {
        .cards-container {
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
        }
    }

    .card {
        background: var(--panel);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .card:hover {
        background: var(--panel2);
        border-color: var(--gold);
        transform: translateY(-2px);
    }

    .card-favorite {
        font-size: 18px;
        cursor: pointer;
        user-select: none;
    }

    .card-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 4px;
        box-sizing: border-box;
    }

    .card-name {
        font-weight: bold;
        font-size: 12px;
        color: var(--text);
        word-break: break-word;
        min-height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card-data {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .card-price {
        color: #60a5fa;
    }

    .card-margin {
        font-weight: bold;
    }

    .card-margin.good {
        color: var(--green);
    }

    .card-margin.bad {
        color: var(--red);
    }

    .card-profit {
        color: var(--gold);
        font-weight: bold;
        padding: 4px;
        background: rgba(245, 197, 66, 0.1);
        border-radius: 4px;
    }

    .card-age {
        font-size: 10px;
        color: var(--muted);
    }

    .status-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 4px;
    }
    .status-fresh { background-color: var(--green); }
    .status-stale { background-color: var(--orange); }
    .status-dead { background-color: var(--red); }

    .footer{
        margin-top:20px;
        color:var(--muted);
        font-size:12px;
    }

    .loading{
        margin-top:20px;
        color:var(--gold);
        text-align: center;
    }

    #cards {
        min-height: 200px;
    }
</style>
</head>
<body>

<h1>🪙 F2P Market Goblin Terminal Pro</h1>

<div class="controls">
    <div class="input-group">
        <label>Search Items</label>
        <input type="text" id="search" placeholder="Search items..." />
    </div>

    <div class="input-group">
        <label>Filter Bracket</label>
        <select id="filter">
            <option value="all">All F2P</option>
            <option value="favorites">Favorites</option>
            <option value="flips">Best High-Volume Flips</option>
        </select>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="under100" />
        <label for="under100">Under 100 GP (Tax Exempt)</label>
    </div>

    <div class="input-group">
        <label>Sort By</label>
        <select id="sort">
            <option value="profit">Highest Profit</option>
            <option value="budget">Highest Budget Profit</option>
            <option value="margin">Highest Margin</option>
            <option value="margin-asc">Lowest Margin</option>
            <option value="recent">Most Recently Updated</option>
            <option value="oldest">Least Recently Updated</option>
        </select>
    </div>

    <div class="input-group">
        <label>Your Cash Stack (GP)</label>
        <input type="number" id="budget" value="100000" placeholder="e.g. 100000" />
    </div>

    <button onclick="refreshData()">🔄 Refresh Data</button>
</div>

<div class="stats" id="stats"></div>

<div class="loading" id="loading">
    Summoning goblin economists...
</div>

<div class="cards-container" id="cards" style="display:none;"></div>

<div class="footer">
    Live data from OSRS Wiki API & Jagex Database. Tax note: Items valued under 100 GP are completely exempt from the 2% Grand Exchange Tax!
</div>

<script>
const mappingURL = "https://prices.runescape.wiki/api/v1/osrs/mapping";
const latestURL = "https://prices.runescape.wiki/api/v1/osrs/latest";
const volumeURL = "https://prices.runescape.wiki/api/v1/osrs/volumes";

const customHeaders = {
    headers: {
        'User-Agent': 'F2P Market Goblin Pro Terminal - Interactive Engine'
    }
};

let allItems = [];
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let searchTimeout;

// Exact 2% post-tax system calculation engine
function calculateNetMargin(low, high) {
    if (high < 100) {
        return high - low; 
    }
    const tax = Math.min(5000000, Math.floor(high * 0.02)); // Corrected to 2%
    return high - low - tax;
}

async function refreshData() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("cards").style.display = "none";
    document.getElementById("loading").innerText = "Summoning goblin economists...";

    try {
        const [mappingRes, latestRes, volumeRes] = await Promise.all([
            fetch(mappingURL, customHeaders),
            fetch(latestURL, customHeaders),
            fetch(volumeURL, customHeaders)
        ]);

        const mapping = await mappingRes.json();
        const latest = await latestRes.json();
        const volumes = await volumeRes.json();

        allItems = mapping
        .filter(item => item.members === false)
        .map(item => {
            const price = latest.data[item.id];
            const volume = volumes.data[item.id];

            if(!price) return null;

            const low = price.low || 0;
            const high = price.high || 0;
            const margin = calculateNetMargin(low, high); 
            const buyVolume = volume || 0;
            const geLimit = item.limit || 0;

            const lastUpdateTime = Math.max(price.lowTime || 0, price.highTime || 0);
            const maxProfit = margin > 0 && geLimit > 0 ? margin * geLimit : 0;

            return {
                id: item.id,
                name: item.name,
                low,
                high,
                margin,
                buyVolume,
                geLimit,
                maxProfit,
                lastUpdateTime
            };
        })
        .filter(Boolean);

        renderCards();

    } catch(err){
        console.error(err);
        document.getElementById("loading").innerText = "The goblin market exploded. Check developer console.";
    }
}

function renderCards(){
    const cardsContainer = document.getElementById("cards");
    cardsContainer.innerHTML = "";

    let items = [...allItems];

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;
    const sort = document.getElementById("sort").value;
    const under100 = document.getElementById("under100").checked;
    const budget = parseInt(document.getElementById("budget").value) || 0;
    const nowSeconds = Math.floor(Date.now() / 1000);

    // Dynamic property injection (Budget based parameters)
    items = items.map(item => {
        let affordableQty = item.low > 0 ? Math.floor(budget / item.low) : 0;
        if(item.geLimit > 0 && affordableQty > item.geLimit) {
            affordableQty = item.geLimit;
        }
        const budgetProfit = item.margin > 0 ? affordableQty * item.margin : 0;
        const isFavNum = favorites.includes(item.id) ? 1 : 0;

        return { ...item, affordableQty, budgetProfit, favorite: isFavNum };
    });

    // Content filtration engines
    if(search) {
        items = items.filter(item => item.name.toLowerCase().includes(search));
    }

    if(under100){
        items = items.filter(item => item.low > 0 && item.low < 100);
    }

    if(filter === "favorites"){
        items = items.filter(item => favorites.includes(item.id));
    } else if(filter === "flips"){
        items = items.filter(item => item.margin > 1 && item.buyVolume > 15000);
    }

    // Sort by selected option
    if(sort === "profit"){
        items.sort((a, b) => b.maxProfit - a.maxProfit);
    } else if(sort === "budget"){
        items.sort((a, b) => b.budgetProfit - a.budgetProfit);
    } else if(sort === "margin"){
        items.sort((a, b) => b.margin - a.margin);
    } else if(sort === "margin-asc"){
        items.sort((a, b) => a.margin - b.margin);
    } else if(sort === "recent"){
        items.sort((a, b) => b.lastUpdateTime - a.lastUpdateTime);
    } else if(sort === "oldest"){
        items.sort((a, b) => a.lastUpdateTime - b.lastUpdateTime);
    }

    // Render up to 300 cards
    items.slice(0, 300).forEach(item => {
        const isFavorite = favorites.includes(item.id);
        const iconSrc = `https://secure.runescape.com/m=itemdb_oldschool/obj_big.gif?id=${item.id}`;

        const ageMinutes = item.lastUpdateTime > 0 ? Math.floor((nowSeconds - item.lastUpdateTime) / 60) : 999;
        let statusClass = "status-dead";
        let ageText = ageMinutes + "m";
        
        if (ageMinutes <= 3) statusClass = "status-fresh";
        else if (ageMinutes <= 12) statusClass = "status-stale";
        
        if (item.lastUpdateTime === 0 || ageMinutes > 120) {
            ageText = "Old";
        }

        const marginClass = item.margin > 0 ? "good" : "bad";

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-favorite" onclick="toggleFavorite(${item.id}); event.stopPropagation();">
                ${isFavorite ? "⭐" : "☆"}
            </div>
            <img src="${iconSrc}" alt="${item.name}" class="card-icon" onerror="this.src='https://secure.runescape.com/m=itemdb_oldschool/obj_big.gif?id=995';">
            <div class="card-name">${item.name}</div>
            <div class="card-data">
                <div class="card-price">Buy: ${item.low.toLocaleString()} gp</div>
                <div class="card-price">Sell: ${item.high.toLocaleString()} gp</div>
                <div class="card-margin ${marginClass}">Margin: ${Math.floor(item.margin).toLocaleString()} gp</div>
                <div class="card-profit">+${Math.floor(item.budgetProfit).toLocaleString()} gp</div>
                <div class="card-age"><span class="status-dot ${statusClass}"></span>${ageText}</div>
            </div>
        `;
        cardsContainer.appendChild(card);
    });

    document.getElementById("stats").innerHTML = `📊 Found ${items.length.toLocaleString()} items matching criteria`;
    document.getElementById("loading").style.display = "none";
    document.getElementById("cards").style.display = "grid";
}

function toggleFavorite(id){
    if(favorites.includes(id)){
        favorites = favorites.filter(x => x !== id);
    } else {
        favorites.push(id);
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    renderCards();
}

document.getElementById("search").addEventListener("input", () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(renderCards, 220);
});
document.getElementById("filter").addEventListener("change", renderCards);
document.getElementById("sort").addEventListener("change", renderCards);
document.getElementById("under100").addEventListener("change", renderCards);
document.getElementById("budget").addEventListener("input", renderCards);

refreshData();
setInterval(refreshData, 60000);
</script>

</body>
</html>
