name: Build Goblin APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create App Environment
        run: |
          # Initialize configuration scripts
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          
          # Generate the local setup profiles
          npx cap init "Goblin Terminal" "com.goblin.market" --web-dir=www
          
          # Add the android platform (this generates the /android folder and its gradlew files)
          npx cap add android
          
          # Sync the web assets into the android project
          npx cap sync

      - name: Compile Android Debug APK
        run: |
          cd android
          # Grant execution permission to the freshly generated Gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoblinTerminal-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
